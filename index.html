<style>
  :root{
    --black:#121113; --panel:#1b191a; --panel2:#232021; --border:#35302d;
    --ink:#f4f1ea; --sub:#a8a29a; --metal:#bcbfc3; --metalDark:#6f7276;
    --walnut:#6b4a32; --walnutLt:#9a6f4d; --amber:#cf954f; --danger:#c0524e;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--black);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:980px;margin:0 auto;padding:16px;}
  @media(min-width:640px){.wrap{padding:24px;}}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,select,textarea{font-family:inherit;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;}
  h2.sec{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px;}
  .muted{color:var(--metalDark);font-size:11px;}
  .hidden{display:none!important;}
  /* 헤더 */
  header{background:linear-gradient(135deg,#232021,#161415);border:1px solid var(--border);
    border-radius:18px;padding:20px;margin-bottom:20px;}
  .hdrow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;}
  .logo{background:var(--walnut);border-radius:12px;width:48px;height:48px;
    display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  h1{font-size:21px;font-weight:800;letter-spacing:-.4px;}
  @media(min-width:640px){h1{font-size:24px;}}
  /* 탭 */
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;
    background:var(--panel);color:var(--sub);border:1px solid var(--border);
    display:flex;align-items:center;gap:6px;}
  .tab.on{background:var(--walnut);color:var(--ink);border-color:var(--walnutLt);}
  /* 통계 */
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  @media(min-width:880px){.stats{grid-template-columns:repeat(4,1fr);}}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .stat .lbl{color:var(--metalDark);font-size:12px;}
  .stat .val{font-size:24px;font-weight:800;margin-top:4px;}
  .stat .sub{color:var(--sub);font-size:12px;}
  /* 차트 */
  .barrow{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .barlabel{width:130px;font-size:11px;color:var(--sub);text-align:right;flex-shrink:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bartrack{flex:1;background:var(--panel2);border-radius:6px;height:18px;overflow:hidden;}
  .barfill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;
    padding-right:6px;font-size:10px;font-weight:700;color:var(--black);min-width:24px;}
  /* 정렬 */
  .sortbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .chip{font-size:12px;padding:5px 10px;border-radius:7px;font-weight:600;
    background:var(--panel2);color:var(--sub);border:1px solid var(--border);}
  .chip.on{background:var(--walnut);color:var(--ink);border-color:var(--walnutLt);}
  select.sel{font-size:12px;padding:5px 8px;border-radius:7px;background:var(--panel2);
    color:var(--ink);border:1px solid var(--border);outline:none;}
  /* 원두 카드 */
  .beans{display:grid;grid-template-columns:1fr;gap:12px;padding-bottom:32px;}
  @media(min-width:640px){.beans{grid-template-columns:repeat(2,1fr);}}
  .bean{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;
    display:flex;flex-direction:column;gap:10px;}
  .bean .brand{font-size:13px;font-weight:700;color:var(--metalDark);letter-spacing:.3px;}
  .bean .bname{font-size:18px;font-weight:800;line-height:1.25;}

    border:1px solid #2f6b3f;letter-spacing:.3px;}
  .nowdot{width:6px;height:6px;border-radius:50%;background:#5fd17e;display:inline-block;}
  .bean.dim{opacity:.55;}
  .saletoggle{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:var(--panel);}
  .saletoggle.on{background:#1e3a24;color:#5fd17e;border-color:#2f6b3f;}
  .saletoggle.off{color:var(--metalDark);}
  .swdot{width:28px;height:16px;border-radius:999px;background:var(--border);
    position:relative;transition:background .15s;flex-shrink:0;}
  .swdot.on{background:#2f6b3f;}
  .swdot::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;
    border-radius:50%;background:var(--ink);transition:left .15s;}
  .swdot.on::after{left:14px;}
  .nowsec{background:linear-gradient(135deg,#1e3a24,#161d18);border:1px solid #2f6b3f;
    border-radius:14px;padding:16px;margin-bottom:20px;}
  .brandrow{display:flex;align-items:center;gap:12px;}
  .blogo{width:80px;height:80px;border-radius:14px;object-fit:cover;flex-shrink:0;
    background:var(--panel2);border:1px solid var(--border);}
  .blogo.ph{display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--metalDark);}
  /* 로고 관리 */
  .logorow{display:flex;align-items:center;gap:12px;padding:12px;border-radius:9px;
    background:var(--panel2);border:1px solid var(--border);margin-bottom:8px;}
  .logobig{width:48px;height:48px;border-radius:9px;object-fit:cover;flex-shrink:0;
    background:var(--panel);border:1px solid var(--border);}
  .logobig.ph{display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--metalDark);}
  .procpill{font-size:11px;padding:4px 8px;border-radius:6px;background:var(--panel2);
    color:var(--metal);border:1px solid var(--border);white-space:nowrap;}
  .origin{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);}
  .notetags{display:flex;flex-wrap:wrap;gap:6px;}
  .ntag{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;}
  .subnote{font-size:12px;color:var(--metalDark);}
  .beanfoot{display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--border);padding-top:10px;margin-top:2px;}
  .price{font-size:15px;font-weight:800;color:var(--amber);}
  .votebtn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:9px;
    font-size:13px;font-weight:800;background:var(--panel2);color:var(--sub);
    border:1px solid var(--border);transition:transform .08s;}
  .votebtn:active{transform:scale(.95);}
  .votebtn.voted{background:var(--walnut);color:#ff8e8e;border-color:var(--walnutLt);}

  .btn.amber{background:var(--amber);color:var(--black);border-color:var(--walnutLt);}

    background:var(--panel2);color:var(--metalDark);border:1px solid var(--border);}

  .arow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px;border-radius:9px;
    background:var(--panel2);border:1px solid var(--border);margin-bottom:8px;}
  .icobtn{width:30px;height:30px;border-radius:7px;background:var(--panel);
    border:1px solid var(--border);color:var(--metal);font-size:14px;
    display:flex;align-items:center;justify-content:center;}
  .stepbtn{width:28px;height:28px;border-radius:6px;background:var(--panel);
    border:1px solid var(--border);color:var(--sub);font-size:15px;font-weight:800;}
  .flash{padding:9px 12px;border-radius:9px;font-size:12px;font-weight:700;
    background:var(--walnut);color:var(--ink);border:1px solid var(--walnutLt);margin-bottom:16px;}
  .err{color:var(--danger);font-size:11px;margin-top:6px;}
  .pre{background:var(--panel2);border:1px solid var(--border);border-radius:8px;
    padding:10px;font-size:11px;color:var(--metal);white-space:pre-wrap;
    font-family:ui-monospace,Menlo,Consolas,monospace;line-height:1.6;}

    padding:12px;margin-bottom:16px;font-size:12px;color:var(--amber);}
  .map{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  svg{display:block;width:100%;height:auto;}
  /* 원두 요청 */
  .reqcard{background:linear-gradient(135deg,#2a2320,#1a1718);border:1px solid var(--walnut);
    border-radius:14px;padding:16px;margin-bottom:20px;}
  .reqtop{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .reqtopitem{background:var(--panel2);border:1px solid var(--border);border-radius:999px;
    padding:5px 12px;font-size:12px;color:var(--ink);}
  .reqtopitem b{color:var(--amber);}
  .reqstat{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .reqstat .nm{width:90px;font-size:12px;color:var(--sub);flex-shrink:0;}
  .reqstat .tk{flex:1;background:var(--panel);border-radius:5px;height:16px;overflow:hidden;}
  .reqstat .fl2{height:100%;background:var(--walnutLt);border-radius:5px;}
  .reqstat .ct{font-size:11px;color:var(--amber);font-weight:700;width:36px;}
  .reqitem{padding:10px;border-radius:9px;background:var(--panel2);
    border:1px solid var(--border);margin-bottom:8px;font-size:12px;}
  .reqitem .meta{color:var(--metal);font-weight:700;}
  .reqitem .cmt{color:var(--sub);margin-top:4px;}
  .reqitem .dt{color:var(--metalDark);font-size:10px;margin-top:4px;}
  /* 일괄 편집 표 */
  .bulkrow{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:8px;
    padding:8px;border-radius:8px;background:var(--panel2);
    border:1px solid var(--border);margin-bottom:6px;align-items:center;}
  .bulkrow .konm{font-size:12px;color:var(--ink);font-weight:700;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bulkrow input{width:100%;padding:5px 8px;border-radius:6px;font-size:11px;
    background:var(--panel);color:var(--ink);border:1px solid var(--border);outline:none;}
  .bulkhead{display:grid;grid-template-columns:1fr 1fr 1.3fr;gap:8px;
    padding:0 8px 4px;font-size:10px;color:var(--metalDark);font-weight:700;}
  @media(max-width:560px){
    .bulkrow{grid-template-columns:1fr;}
    .bulkhead{display:none;}
  }
</style>

/* 한국어 세부 노트 문자열 → 영어 변환 (쉼표·중점 등 구분자 유지) */
function autoTranslateNotes(ko){
  if(!ko)return "";
  return String(ko).split(/([,，、·]\s*)/).map(function(seg){
    if(/^[,，、·]/.test(seg))return seg;
    var w=seg.trim();
    if(!w)return seg;
    if(FLAVOR_DICT[w])return FLAVOR_DICT[w];
    /* 부분 포함 매칭 (긴 키 우선) */
    var keys=Object.keys(FLAVOR_DICT).sort(function(a,b){return b.length-a.length;});
    for(var i=0;i<keys.length;i++){
      if(w.indexOf(keys[i])>=0)return FLAVOR_DICT[keys[i]];
    }
    return w; /* 사전에 없으면 원문 유지 */
  }).join("");
}
/* 표시용: 한국어는 subnotes, 그 외 언어는 subnotesEn 우선 → 없으면 자동변환 */
function subnoteText(b,l){
  if(l==="ko")return b.subnotes||"";
  if(b.subnotesEn&&b.subnotesEn.trim())return b.subnotesEn;
  return autoTranslateNotes(b.subnotes||"");
}
/* 브랜드 표시명: 한국어는 원래 이름, 그 외 언어는 brandLogos에 저장된 영어명 우선 */
function brandName(brand,l){
  if(l==="ko")return brand;
  var en=state.brandNamesEn&&state.brandNamesEn[brand];
  return (en&&en.trim())?en:brand;
}

/* ---------- Firebase ----------
   DB 구조: cafeDennis/beans (배열), cafeDennis/brandLogos (브랜드명→dataURL),
            cafeDennis/requests (요청 배열) */
let beansRef=null, logosRef=null, reqRef=null, brandEnRef=null;
function initFirebase(){
  const cfg=FIREBASE_CONFIG;
  if(!cfg.apiKey||cfg.apiKey.indexOf("여기에")===0||!cfg.databaseURL||cfg.databaseURL.indexOf("여기에")>=0){
    state.fbReady=false; loadLocal(); return;
  }
  try{
    firebase.initializeApp(cfg);
    const root=firebase.database().ref("cafeDennis");
    beansRef=root.child("beans");
    logosRef=root.child("brandLogos");
    reqRef=root.child("requests");
    brandEnRef=root.child("brandNamesEn");
    state.fbReady=true;
    beansRef.on("value",snap=>{
      const v=snap.val();
      if(v&&Array.isArray(v)){state.beans=v.filter(Boolean);}
      else if(v&&typeof v==="object"){state.beans=Object.keys(v).map(k=>v[k]).filter(Boolean);}
      else{state.beans=SEED.slice();beansRef.set(SEED);}
      render();
    },err=>{console.error("Firebase:",err);state.fbReady=false;loadLocal();});
    logosRef.on("value",snap=>{
      state.brandLogos=snap.val()||{};
      render();
    },err=>{console.error("Firebase logos:",err);});
    brandEnRef.on("value",snap=>{
      state.brandNamesEn=snap.val()||{};
      render();
    },err=>{console.error("Firebase brandEn:",err);});
    reqRef.on("value",snap=>{
      const v=snap.val();
      if(v&&Array.isArray(v)){state.requests=v.filter(Boolean);}
      else if(v&&typeof v==="object"){state.requests=Object.keys(v).map(k=>v[k]).filter(Boolean);}
      else{state.requests=[];}
      render();
    },err=>{console.error("Firebase requests:",err);});
  }catch(e){console.error(e);state.fbReady=false;loadLocal();}
}
function loadLocal(){
  const ls=localStorage.getItem("cdn-beans");
  state.beans=ls?JSON.parse(ls):SEED.slice();
  state.brandLogos=JSON.parse(localStorage.getItem("cdn-logos")||"{}");
  state.brandNamesEn=JSON.parse(localStorage.getItem("cdn-branden")||"{}");
  state.requests=JSON.parse(localStorage.getItem("cdn-requests")||"[]");
  render();
}
function saveBeans(next){
  /* Firebase가 배열에 구멍이 생기면 객체로 바꿔버리는 문제 방지:
     항상 인덱스가 연속된 깨끗한 배열로 정리해서 저장 */
  const clean=(next||[]).filter(Boolean).slice();
  state.beans=clean;
  if(state.fbReady&&beansRef){
    beansRef.set(clean).then(()=>render()).catch(e=>{console.error(e);render();});
  }else{
    localStorage.setItem("cdn-beans",JSON.stringify(clean));
    render();
  }
}
function saveLogos(next){
  state.brandLogos=next;
  if(state.fbReady&&logosRef){logosRef.set(next).catch(e=>console.error(e));}
  else{localStorage.setItem("cdn-logos",JSON.stringify(next));render();}
}
function saveBrandEn(next){

  if(state.fbReady&&brandEnRef){brandEnRef.set(next).catch(e=>console.error(e));}
  else{localStorage.setItem("cdn-branden",JSON.stringify(next));render();}
}
function saveRequests(next){
  const clean=(next||[]).filter(Boolean).slice();
  state.requests=clean;
  if(state.fbReady&&reqRef){
    reqRef.set(clean).then(()=>render()).catch(e=>{console.error(e);render();});

/* 투표 합산 */
function voteBean(id){
  const voted=state.myVotes.includes(id);
  const delta=voted?-1:1;
  state.beans=state.beans.map(b=>b.id===id?{...b,votes:Math.max(0,(b.votes||0)+delta)}:b);
  if(state.fbReady&&beansRef){beansRef.set(state.beans).catch(e=>console.error(e));}
  else{localStorage.setItem("cdn-beans",JSON.stringify(state.beans));}
  state.myVotes=voted?state.myVotes.filter(x=>x!==id):[...state.myVotes,id];
  localStorage.setItem("cdn-myvotes",JSON.stringify(state.myVotes));
  render();
}

/* ---------- PNG 로고 압축 (1:1 정사각, 최대 160px) ---------- */
function compressLogo(file,cb){
  const fr=new FileReader();
  fr.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const SZ=160;
      const cv=document.createElement("canvas");
      cv.width=SZ;cv.height=SZ;
      const ctx=cv.getContext("2d");
      /* 1:1 업로드 전제 — 정사각 캔버스에 꽉 채움 (혹시 비정사각이면 center-crop) */
      const side=Math.min(img.width,img.height);
      const sx=(img.width-side)/2, sy=(img.height-side)/2;
      ctx.clearRect(0,0,SZ,SZ);
      ctx.drawImage(img,sx,sy,side,side,0,0,SZ,SZ);
      cb(cv.toDataURL("image/png"));
    };
    img.onerror=()=>cb(null);
    img.src=fr.result;
  };
  fr.onerror=()=>cb(null);
  fr.readAsDataURL(file);
}

/* ---------- 패턴 파싱 ---------- */
function mapCountry(s){
  const k=(s||"").trim().toLowerCase();
  if(COUNTRY_ALIAS[k])return COUNTRY_ALIAS[k];
  for(const key in COUNTRY_ALIAS){if(k.indexOf(key)>=0)return COUNTRY_ALIAS[key];}
  return COUNTRIES[0].id;
}
function mapProcess(s){
  const k=(s||"").trim().toLowerCase().replace(/[\s()]/g,"");
  if(PROC_ALIAS[k])return PROC_ALIAS[k];
  for(const key in PROC_ALIAS){if(k.indexOf(key)>=0)return PROC_ALIAS[key];}
  return "Other";
}
function mapNotes(s){
  const out=[];
  (s||"").split(/[,，、·]/).forEach(part=>{
    const k=part.trim().toLowerCase();
    if(!k)return;
    if(NOTE_ALIAS[k]){if(out.indexOf(NOTE_ALIAS[k])<0)out.push(NOTE_ALIAS[k]);return;}
    for(const key in NOTE_ALIAS){if(k.indexOf(key)>=0){if(out.indexOf(NOTE_ALIAS[key])<0)out.push(NOTE_ALIAS[key]);break;}}
  });
  return out.slice(0,3);
}
function parsePattern(text){
  const beans=[];
  text.split(/\r?\n/).forEach(line=>{
    const ln=line.trim();
    if(!ln)return;
    const f=ln.split("|").map(x=>x.trim());
    if(f.length<2||!f[0]||!f[1])return;
    /* 원두명 칸: "한국어명 / English name" 형태면 영문명 분리 */
    let nm=f[1], nmEn="";
    const slash=f[1].indexOf("/");
    if(slash>=0){nm=f[1].slice(0,slash).trim();nmEn=f[1].slice(slash+1).trim();}
    /* 세부노트 칸도 "한국어 / English" 분리 지원, 없으면 자동 변환 */
    let sub=f[5]||"", subEn="";
    const slash2=sub.indexOf("/");
    if(slash2>=0){const a=sub;sub=a.slice(0,slash2).trim();subEn=a.slice(slash2+1).trim();}
    beans.push({
      id:"b_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
      brand:f[0], name:nm, nameEn:nmEn,
      country:mapCountry(f[2]||""),
      process:mapProcess(f[3]||""),
      notes:mapNotes(f[4]||""),
      subnotes:sub, subnotesEn:subEn,
      price:Number((f[6]||"").replace(/[^\d]/g,""))||0,
      votes:0
    });
  });
  return beans;
}

function mapSVG(cstats,filter){

  s+='<line x1="0" y1="'+beltTop+'" x2="720" y2="'+beltTop+'" stroke="#cf954f" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.5"/>';
  s+='<line x1="0" y1="'+beltBot+'" x2="720" y2="'+beltBot+'" stroke="#cf954f" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.5"/>';

    const pts=p.map(c=>proj(c[0],c[1]).join(",")).join(" ");
    s+='<polygon points="'+pts+'" fill="#6f7276" opacity="0.22" stroke="#bcbfc3" stroke-width="0.6" stroke-opacity="0.4"/>';
  });

}

  const i=state.form.notes.indexOf(n);

  render();
};
window.saveForm=()=>{
  const f=state.form;
  if(!f.brand.trim()||!f.name.trim()){flash(t("msgNeedName"));return;}
  const rec={brand:f.brand.trim(),name:f.name.trim(),nameEn:(f.nameEn||"").trim(),
    country:f.country,process:f.process,
    notes:f.notes.slice(),subnotes:f.subnotes,subnotesEn:(f.subnotesEn||"").trim(),price:Number(f.price)||0};
  if(state.editId){
    saveBeans(state.beans.map(b=>b.id===state.editId?Object.assign({},b,rec):b));
    flash(t("msgEdited"));
  }else{
    rec.id="b_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);rec.votes=0;rec.onSale=true;
    saveBeans([...state.beans,rec]);
    flash(t("msgAdded"));
  }
  state.editId=null;
  state.form={brand:"",name:"",nameEn:"",country:COUNTRIES[0].id,process:"Washed",notes:[],subnotes:"",subnotesEn:"",price:""};
  render();
};
window.editBean=id=>{
  const b=state.beans.find(x=>x.id===id);if(!b)return;
  state.editId=id;
  state.form={brand:b.brand,name:b.name,nameEn:b.nameEn||"",country:b.country,process:b.process,
    notes:(b.notes||[]).slice(),subnotes:b.subnotes||"",subnotesEn:b.subnotesEn||"",price:b.price||""};
  state.tab="admin";render();
  window.scrollTo({top:0,behavior:"smooth"});
};
window.cancelEdit=()=>{
  state.editId=null;
  state.form={brand:"",name:"",nameEn:"",country:COUNTRIES[0].id,process:"Washed",notes:[],subnotes:"",subnotesEn:"",price:""};
  render();
};
window.delBean=id=>{
  const target=state.beans.find(b=>b.id===id);
  if(!target)return;
  let ok=true;
  try{ok=confirm(t("confirmDel"));}catch(_){ok=true;}
  if(!ok)return;
  const next=state.beans.filter(b=>b.id!==id);
  saveBeans(next);
  if(state.editId===id)window.cancelEdit();
  flash(t("msgDeleted"));
};
window.adjust=(id,d)=>{
  saveBeans(state.beans.map(b=>b.id===id?Object.assign({},b,{votes:Math.max(0,(b.votes||0)+d)}):b));
};
window.toggleSale=id=>{
  saveBeans(state.beans.map(b=>b.id===id?Object.assign({},b,{onSale:!(b.onSale!==false)}):b));
};
window.state_patText=v=>{state.patText=v;};
/* ---------- 원두 요청 핸들러 ---------- */
window.rForm=(k,v)=>{state.reqForm[k]=v;};
window.submitRequest=()=>{
  const rf=state.reqForm;
  if(!rf.country){flash(t("reqNeedCountry"));return;}
  /* 연속 제출 제한: 한 브라우저에서 60초에 1건 */
  const last=Number(localStorage.getItem("cdn-lastreq")||"0");
  if(Date.now()-last<60000){flash(t("reqTooFast"));return;}
  const rec={
    id:"r_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
    country:rf.country, process:rf.process||"",
    brand:(rf.brand||"").trim().slice(0,40),
    comment:(rf.comment||"").trim().slice(0,120),
    ts:Date.now()
  };
  saveRequests([...state.requests,rec]);
  localStorage.setItem("cdn-lastreq",String(Date.now()));
  state.reqForm={country:"",process:"",brand:"",comment:""};
  flash(t("reqDone"));
  render();
};
window.delRequest=id=>{
  saveRequests(state.requests.filter(r=>r.id!==id));
  flash(t("reqDeleted"));
};
window.clearRequests=()=>{
  let ok=true;
  try{ok=confirm(t("reqClearConfirm"));}catch(_){ok=true;}
  if(!ok)return;
  saveRequests([]);
  flash(t("reqDeleted"));
};
/* ---------- 영어 일괄 수정 핸들러 ---------- */
window.bulkField=(id,key,val)=>{
  /* 입력 중에는 버퍼에만 저장 (저장 버튼 누를 때 일괄 반영) */
  if(!state.bulkEdits[id])state.bulkEdits[id]={};
  state.bulkEdits[id][key]=val;
};
window.bulkSaveAll=()=>{
  const edits=state.bulkEdits||{};
  const next=state.beans.map(b=>{
    const e=edits[b.id];
    if(!e)return b;
    const merged=Object.assign({},b);
    if(typeof e.nameEn==="string")merged.nameEn=e.nameEn.trim();
    if(typeof e.subnotesEn==="string")merged.subnotesEn=e.subnotesEn.trim();
    return merged;
  });
  state.bulkEdits={};
  saveBeans(next);
  flash(t("bulkSaved"));
};
window.bulkAutoNotes=()=>{
  let n=0;
  const next=state.beans.map(b=>{
    /* 영어 노트가 비어 있고 한국어 노트가 있으면 자동 변환 */
    if((!b.subnotesEn||!b.subnotesEn.trim())&&b.subnotes&&b.subnotes.trim()){
      const conv=autoTranslateNotes(b.subnotes);
      if(conv&&conv.trim()){n++;return Object.assign({},b,{subnotesEn:conv});}
    }
    return b;
  });
  if(!n){flash(t("bulkAutoNone"));return;}
  state.bulkEdits={};
  saveBeans(next);
  flash(n+t("bulkAutoDone"));
};
window.uploadLogo=(brand,e)=>{
  const file=e.target.files&&e.target.files[0];
  e.target.value="";
  if(!file)return;
  if(file.type!=="image/png"){flash(t("logoErr"));return;}
  compressLogo(file,dataUrl=>{
    if(!dataUrl){flash(t("logoErr"));return;}
    const next=Object.assign({},state.brandLogos);
    next[brand]=dataUrl;
    saveLogos(next);
    flash(t("logoSaved"));
  });
};
window.removeLogo=brand=>{
  const next=Object.assign({},state.brandLogos);
  delete next[brand];
  saveLogos(next);
  flash(t("logoRemoved"));
};
window.saveBrandEnName=(brand,val)=>{
  const next=Object.assign({},state.brandNamesEn);
  const v=(val||"").trim();
  if(v){next[brand]=v;}else{delete next[brand];}
  saveBrandEn(next);
  flash(t("brandEnSaved"));
};
window.runPattern=()=>{
  const parsed=parsePattern(state.patText||"");
  if(!parsed.length){patMsg(t("patNone"));return;}
  saveBeans([...state.beans,...parsed]);
  state.patText="";
  patMsg(parsed.length+t("patResult"));
};
window.exportJSON=()=>{
  const payload={beans:state.beans,brandLogos:state.brandLogos,requests:state.requests,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="cafe-dennis-beans-"+new Date().toISOString().slice(0,10)+".json";
  a.click();URL.revokeObjectURL(a.href);
  flash(t("msgExported"));
};
window.importJSON=e=>{
  const file=e.target.files&&e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      /* 신형: {beans,brandLogos,requests} / 구형: 배열 둘 다 지원 */
      const arr=Array.isArray(data)?data:data.beans;
      if(!Array.isArray(arr))throw new Error();
      saveBeans(arr.map(d=>Object.assign({votes:0,notes:[]},d,
        {id:d.id||"b_"+Math.random().toString(36).slice(2)})));
      if(data&&data.brandLogos&&typeof data.brandLogos==="object")saveLogos(data.brandLogos);
      if(data&&Array.isArray(data.requests))saveRequests(data.requests);
      flash(t("msgImported"));
    }catch(_){flash(t("msgImportFail"));}
  };
  r.readAsText(file);
  e.target.value="";
};

/* ============================================================
   시작
   ============================================================ */
initFirebase();
render();
</script>
